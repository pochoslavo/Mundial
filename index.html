<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Completo - Polla Mundial</title>
    
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 { margin: 0; color: #111827; font-size: 2.2rem; font-weight: 800; }
        p { color: #6b7280; margin-top: 5px; }

        /* --- Estilos del Podio Estructurado --- */
        .podio-capa { margin-bottom: 20px; }
        
        /* Fila 1: Top 3 */
        .podio-fila-1 {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
        }
        /* Fila 2 y 3: Escoltas y Colistas */
        .podio-fila-2, .podio-fila-3 {
            display: flex;
            justify-content: center;
            gap: 15px;
            max-width: 600px;
            margin: 15px auto 0 auto;
        }

        .podio-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
            text-align: center;
            flex: 1;
        }
        
        /* Alturas y bordes del Top 3 */
        .p1 { height: 140px; border-top: 8px solid #ffd700; order: 2; }
        .p2 { height: 115px; border-top: 8px solid #c0c0c0; order: 1; }
        .p3 { height: 100px; border-top: 8px solid #cd7f32; order: 3; }
        
        /* 4to y 5to */
        .p4, .p5 { border-top: 5px solid #3b82f6; padding: 12px; }
        /* Colistas (Más pequeños) */
        .c1, .c2 { border-top: 5px solid #111827; padding: 8px; font-size: 0.9rem; background: #fafafa; }

        .podio-puesto { font-size: 0.8rem; font-weight: bold; color: #666; text-transform: uppercase; }
        .podio-nombre { font-size: 1.1rem; font-weight: bold; margin: 5px 0; color: #111827; }
        .podio-puntos { font-size: 1.3rem; font-weight: 800; color: #2563eb; }
        
        /* Ajustes fuentes colistas */
        .c1 .podio-nombre, .c2 .podio-nombre { font-size: 1rem; margin: 2px 0; }
        .c1 .podio-puntos, .c2 .podio-puntos { font-size: 1.1rem; color: #ef4444; }

        /* --- Buscador Interactivo --- */
        .search-wrapper {
            max-width: 1000px;
            margin: 30px auto 15px auto;
            text-align: center;
        }
        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus {
            border-color: #3b82f6;
        }

        /* --- Leaderboard --- */
        .leaderboard-wrapper {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 1000px;
            margin: 0 auto 40px auto;
        }
        .scroll-container {
            max-height: 550px;
            overflow-y: auto;
        }

        /* --- Gráficos de Votos Extras (Grid de abajo) --- */
        .grid-graficos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 40px auto 0 auto;
            border-top: 2px dashed #e5e7eb;
            padding-top: 40px;
        }
        .grafico-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            min-height: 400px;
        }

        @media (max-width: 600px) {
            .podio-fila-1 { align-items: center; }
            .p1, .p2, .p3 { height: auto; order: unset; }
            .grid-graficos { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>📊 Dashboard Oficial: Polla Mundial</h1>
        <p>Resultados, Posiciones Intermedias y Tendencias de Votos</p>
    </header>

    <div class="podio-capa">
        <div class="podio-fila-1">
            <div class="podio-card p2">
                <div class="podio-puesto">2° Lugar 🥈</div>
                <div class="podio-nombre">Padelera</div>
                <div class="podio-puntos">63 pts</div>
            </div>
            <div class="podio-card p1">
                <div class="podio-puesto">👑 Líder Absoluto 🥇</div>
                <div class="podio-nombre">He-van</div>
                <div class="podio-puntos">65 pts</div>
            </div>
            <div class="podio-card p3">
                <div class="podio-puesto">3° Lugar 🥉</div>
                <div class="podio-nombre">7 Pulmones</div>
                <div class="podio-puntos">63 pts</div>
            </div>
        </div>

        <div class="podio-fila-2">
            <div class="podio-card p4">
                <div class="podio-puesto">4° Lugar</div>
                <div class="podio-nombre">Nacho</div>
                <div class="podio-puntos" style="color:#3b82f6;">62 pts</div>
            </div>
            <div class="podio-card p5">
                <div class="podio-puesto">5° Lugar</div>
                <div class="podio-nombre">Sinver</div>
                <div class="podio-puntos" style="color:#3b82f6;">62 pts</div>
            </div>
        </div>

        <div class="podio-fila-3">
            <div class="podio-card c1">
                <div class="podio-puesto">⚠️ Colista 1</div>
                <div class="podio-nombre">SurPasivo</div>
                <div class="podio-puntos">32 pts</div>
            </div>
            <div class="podio-card c2">
                <div class="podio-puesto">💀 Colista 2</div>
                <div class="podio-nombre">Manolo</div>
                <div class="podio-puntos">30 pts</div>
            </div>
        </div>
    </div>

    <div class="search-wrapper">
        <input type="text" id="input-buscar" class="search-input" placeholder="🔍 Busca tu nombre para filtrar la tabla...">
    </div>

    <div class="leaderboard-wrapper">
        <div class="scroll-container">
            <div id="container-leaderboard" style="width: 100%; height: 1200px;"></div>
        </div>
    </div>

    <div class="grid-graficos">
        <div id="container-campeon" class="grafico-card"></div>
        <div id="container-goleador" class="grafico-card"></div>
        <div id="container-tarjetas" class="grafico-card"></div>
        <div id="container-goles" class="grafico-card"></div>
    </div>

    <script>
        // --- DATOS MAESTROS DE PARTICIPANTES ---
        // Se añade la propiedad 'rank' explícita para que no se pierda al filtrar con el buscador
        const participantesMaster = [
            { rank: 1, name: 'He-van', y: 65, color: '#ffd700' },
            { rank: 2, name: 'Padelera', y: 63, color: '#c0c0c0' },
            { rank: 3, name: '7 Pulmones', y: 63, color: '#cd7f32' },
            { rank: 4, name: 'Nacho', y: 62 }, { rank: 5, name: 'Sinver', y: 62 }, { rank: 6, name: 'Abejorro', y: 62 },
            { rank: 7, name: 'Hugo Closs', y: 61 }, { rank: 8, name: 'La Runner', y: 60 }, { rank: 9, name: 'Baltiloco', y: 60 },
            { rank: 10, name: 'Laucha', y: 60 }, { rank: 11, name: 'AENMB', y: 59 }, { rank: 12, name: 'Presidenta', y: 59 },
            { rank: 13, name: 'Estrella de Navidad', y: 59 }, { rank: 14, name: 'Rene Puente', y: 58 }, { rank: 15, name: 'Renatin', y: 58 },
            { rank: 16, name: 'De Guadalupe', y: 58 }, { rank: 17, name: 'La anguila', y: 58 }, { rank: 18, name: 'Barby', y: 58 },
            { rank: 19, name: 'Mr. Cripto', y: 57 }, { rank: 20, name: 'Malo Pal Fifa', y: 57 }, { rank: 21, name: 'Liz Taylor', y: 55 },
            { rank: 22, name: 'Psicoloco', y: 55 }, { rank: 23, name: 'Destructor', y: 54 }, { rank: 24, name: 'Colombia', y: 54 },
            { rank: 25, name: 'Cesarin', y: 54 }, { rank: 26, name: 'Pionera', y: 53 }, { rank: 27, name: 'Campeon de C', y: 53 },
            { rank: 28, name: 'Carlos Primero', y: 52 }, { rank: 29, name: 'Adrian y sus D', y: 52 }, { rank: 30, name: 'Avispa', y: 51 },
            { rank: 31, name: 'Charles Black', y: 51 }, { rank: 32, name: 'Sr Longanizo', y: 50 }, { rank: 33, name: 'Danita', y: 49 },
            { rank: 34, name: 'Jisus', y: 49 }, { rank: 35, name: 'Agosto', y: 49 }, { rank: 36, name: 'Flash Gordon', y: 48 },
            { rank: 37, name: 'Castañon', y: 48 }, { rank: 38, name: 'Alexitrico', y: 48 }, { rank: 39, name: 'Margaritas', y: 47 },
            { rank: 40, name: 'Pepe', y: 47 }, { rank: 41, name: 'Alfajorcito', y: 46 }, { rank: 42, name: 'Charles White', y: 42 },
            { rank: 43, name: 'Gonzalo Winte', y: 41 }, { rank: 44, name: 'Mosquetona', y: 40 }, { rank: 45, name: 'La Roja', y: 38 },
            { rank: 46, name: 'SurPasivo', y: 32, color: '#ef4444' },
            { rank: 47, name: 'Manolo', y: 30, color: '#111827' }
        ];

        // --- ENRUTADOR DEL LEADERBOARD ---
        let chartLeaderboard;
        
        function initLeaderboard(dataFiltrada) {
            // Muestra dinámicamente las etiquetas del eje como: (Puesto) Nombre
            const categorias = dataFiltrada.map(p => `(${p.rank}) ${p.name}`);
            const nuevaAltura = Math.max(dataFiltrada.length * 26, 200);
            document.getElementById('container-leaderboard').style.height = nuevaAltura + 'px';

            chartLeaderboard = Highcharts.chart('container-leaderboard', {
                chart: { type: 'bar', backgroundColor: 'transparent' },
                title: { text: 'Tabla General Completa', align: 'left', style: { fontWeight: 'bold' } },
                xAxis: {
                    categories: categorias,
                    labels: { style: { fontWeight: 'bold' } }
                },
                yAxis: { min: 25, title: { text: 'Puntos Totales' } },
                legend: { enabled: false },
                credits: { enabled: false },
                plotOptions: {
                    bar: {
                        borderRadius: 4,
                        defaultColor: '#3b82f6',
                        dataLabels: { enabled: true, format: '{point.y} pts' }
                    }
                },
                series: [{ name: 'Puntaje', data: dataFiltrada }]
            });
        }

        // Carga inicial de la tabla
        initLeaderboard(participantesMaster);

        // Lógica del buscador reactivo
        document.getElementById('input-buscar').addEventListener('input', function(e) {
            const texto = e.target.value.toLowerCase().trim();
            const filtrados = participantesMaster.filter(p => p.name.toLowerCase().includes(texto));
            if (chartLeaderboard) chartLeaderboard.destroy();
            initLeaderboard(filtrados);
        });

        // --- CONFIGURACIÓN DE LOS GRÁFICOS INFERIORES DE TENDENCIAS ---
        const configGlobalExtras = {
            credits: { enabled: false }, 
            legend: { enabled: false },
            yAxis: { title: { text: 'Votos' } }, 
            chart: { style: { fontFamily: 'inherit' } },
            plotOptions: {
                bar: { borderRadius: 5, dataLabels: { enabled: true, format: '{point.y} v' } },
                column: { borderRadius: 5, dataLabels: { enabled: true, format: '{point.y}' } }
            }
        };

        // Gráfico 1: Campeón
        Highcharts.chart('container-campeon', Highcharts.merge(configGlobalExtras, {
            chart: { type: 'bar' }, title: { text: '🏆 Favoritos para ser Campeón', align: 'left' },
            xAxis: { categories: ['Francia', 'España', 'Argentina', 'Portugal', 'Brasil', 'Países Bajos', 'Noruega'] },
            series: [{ data: [19, 14, 6, 5, 4, 2, 1], color: '#3b82f6' }]
        }));

        // Gráfico 2: Goleador
        Highcharts.chart('container-goleador', Highcharts.merge(configGlobalExtras, {
            chart: { type: 'bar' }, title: { text: '⚽ País del Goleador', align: 'left' },
            xAxis: { categories: ['Francia', 'Alemania', 'España', 'Argentina', 'Brasil', 'Inglaterra', 'Países Bajos', 'Portugal'] },
            series: [{ data: [16, 14, 11, 5, 3, 2, 1, 1], color: '#10b981' }]
        }));

        // Gráfico 3: Tarjetas
        Highcharts.chart('container-tarjetas', Highcharts.merge(configGlobalExtras, {
            chart: { type: 'column' }, title: { text: '🟨 Equipo con Más Tarjetas', align: 'left' },
            xAxis: { categories: ['Uruguay', 'Argentina', 'Paraguay', 'Brasil', 'España', 'Francia', 'Inglaterra', 'Marruecos', 'México', 'Turquía'] },
            series: [{ data: [24, 13, 5, 4, 2, 1, 1, 1, 1, 1], color: '#f59e0b' }]
        }));

        // Gráfico 4: Más Goles
        Highcharts.chart('container-goles', Highcharts.merge(configGlobalExtras, {
            chart: { type: 'bar' }, title: { text: '🔥 Más Goles en un Solo Partido', align: 'left' },
            xAxis: { categories: ['Alemania', 'Brasil', 'España', 'Argentina', 'Portugal', 'Inglaterra', 'Francia', 'Haití'] },
            series: [{ data: [27, 10, 7, 3, 2, 1, 1, 1], color: '#ef4444' }]
        }));
    </script>
</body>
</html>
