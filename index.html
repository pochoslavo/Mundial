<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas Alternativas - Polla Mundial</title>
    
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        header {
            text-align: center;
            margin-bottom: 35px;
        }
        h1 {
            margin: 0;
            color: #111827;
            font-size: 2.2rem;
            font-weight: 800;
        }
        p {
            color: #6b7280;
            margin-top: 5px;
            font-size: 1.1rem;
        }
        .grid-graficos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .grafico-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
            min-height: 420px;
        }
        @media (max-width: 600px) {
            .grid-graficos {
                grid-template-columns: 1fr;
            }
            body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>📊 Dashboard de Tendencias: Polla Mundial</h1>
        <p>Análisis visual de los favoritos de los participantes (Datos Actualizados)</p>
    </header>

    <div class="grid-graficos">
        <div id="container-campeon" class="grafico-card"></div>
        <div id="container-goleador" class="grafico-card"></div>
        <div id="container-tarjetas" class="grafico-card"></div>
        <div id="container-goles" class="grafico-card"></div>
    </div>

    <script>
        // Configuración global para estilizar los gráficos de forma moderna
        const globalOptions = {
            chart: {
                style: { fontFamily: 'inherit' }
            },
            credits: { enabled: false },
            legend: { enabled: false },
            yAxis: {
                title: { text: 'Cantidad de Votos' },
                gridLineColor: '#e5e7eb'
            }
        };

        // 1. Gráfico: Campeón (Barra Horizontal)
        Highcharts.chart('container-campeon', Highcharts.merge(globalOptions, {
            chart: { type: 'bar' },
            title: { text: '🏆 Favoritos para ser Campeón', align: 'left', style: { fontWeight: 'bold' } },
            xAxis: {
                categories: ['Francia', 'España', 'Argentina', 'Portugal', 'Brasil', 'Países Bajos', 'Noruega'],
                gridLineWidth: 0
            },
            plotOptions: {
                bar: {
                    borderRadius: 6,
                    dataLabels: {
                        enabled: true,
                        format: '{point.y} votos'
                    }
                }
            },
            series: [{
                name: 'Votos',
                data: [19, 14, 6, 5, 4, 2, 1],
                color: '#3b82f6' // Azul vibrante
            }]
        }));

        // 2. Gráfico: País del Goleador (Barra Horizontal)
        Highcharts.chart('container-goleador', Highcharts.merge(globalOptions, {
            chart: { type: 'bar' },
            title: { text: '⚽ País del Goleador', align: 'left', style: { fontWeight: 'bold' } },
            xAxis: {
                categories: ['Francia', 'Alemania', 'España', 'Argentina', 'Brasil', 'Inglaterra', 'Países Bajos', 'Portugal'],
                gridLineWidth: 0
            },
            plotOptions: {
                bar: {
                    borderRadius: 6,
                    dataLabels: {
                        enabled: true,
                        format: '{point.y} votos'
                    }
                }
            },
            series: [{
                name: 'Votos',
                data: [16, 14, 11, 5, 3, 2, 1, 1],
                color: '#10b981' // Verde deportivo
            }]
        }));

        // 3. Gráfico: Más Tarjetas (Columnas Verticales Modernas)
        Highcharts.chart('container-tarjetas', Highcharts.merge(globalOptions, {
            chart: { type: 'column' },
            title: { text: '🟨 Equipo con Más Tarjetas', align: 'left', style: { fontWeight: 'bold' } },
            xAxis: {
                categories: ['Uruguay', 'Argentina', 'Paraguay', 'Brasil', 'España', 'Francia', 'Inglaterra', 'Marruecos', 'México', 'Turquía'],
                crosshair: true
            },
            plotOptions: {
                column: {
                    borderRadius: 6,
                    dataLabels: {
                        enabled: true,
                        format: '{point.y}'
                    }
                }
            },
            series: [{
                name: 'Votos',
                data: [24, 13, 5, 4, 2, 1, 1, 1, 1, 1],
                color: '#f59e0b' // Ámbar/Amarillo tarjeta
            }]
        }));

        // 4. Gráfico: Más Goles en un Partido (Barra Horizontal)
        Highcharts.chart('container-goles', Highcharts.merge(globalOptions, {
            chart: { type: 'bar' },
            title: { text: '🔥 Más Goles en un Solo Partido', align: 'left', style: { fontWeight: 'bold' } },
            xAxis: {
                categories: ['Alemania', 'Brasil', 'España', 'Argentina', 'Portugal', 'Inglaterra', 'Francia', 'Haití'],
                gridLineWidth: 0
            },
            plotOptions: {
                bar: {
                    borderRadius: 6,
                    dataLabels: {
                        enabled: true,
                        format: '{point.y} votos'
                    }
                }
            },
            series: [{
                name: 'Votos',
                data: [27, 10, 7, 3, 2, 1, 1, 1],
                color: '#ef4444' // Rojo poder goleador
            }]
        }));
    </script>
</body>
</html>
