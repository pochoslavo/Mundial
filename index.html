<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Completo - Polla Mundial</title>
    
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 { margin: 0; color: #111827; font-size: 2.2rem; font-weight: 800; }
        p { color: #6b7280; margin-top: 5px; }

        /* --- Estilos del Podio Estructurado --- */
        .podio-capa { margin-bottom: 20px; }
        
        /* Fila 1: Top 3 */
        .podio-fila-1 {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
        }
        /* Fila 2 y 3: Escoltas y Colistas */
        .podio-fila-2, .podio-fila-3 {
            display: flex;
            justify-content: center;
            gap: 15px;
            max-width: 600px;
            margin: 15px auto 0 auto;
        }

        .podio-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
            text-align: center;
            flex: 1;
        }
        
        /* Alturas y bordes del Top 3 */
        .p1 { height: 140px; border-top: 8px solid #ffd700; order: 2; }
        .p2 { height: 115px; border-top: 8px solid #c0c0c0; order: 1; }
        .p3 { height: 100px; border-top: 8px solid #cd7f32; order: 3; }
        
        /* 4to y 5to */
        .p4, .p5 { border-top: 5px solid #3b82f6; padding: 12px; }
        /* Colistas (Más pequeños) */
        .c1, .c2 { border-top: 5px solid #111827; padding: 8px; font-size: 0.9rem; background: #fafafa; }

        .podio-puesto { font-size: 0.8rem; font-weight: bold; color: #666; text-transform: uppercase; }
        .podio-nombre { font-size: 1.1rem; font-weight: bold; margin: 5px 0; color: #111827; }
        .podio-puntos { font-size: 1.3rem; font-weight: 800; color: #2563eb; }
        
        /* Ajustes fuentes colistas */
        .c1 .podio-nombre, .c2 .podio-nombre { font-size: 1rem; margin: 2px 0; }
        .c1 .podio-puntos, .c2 .podio-puntos { font-size: 1.1rem; color: #ef4444; }

        /* --- Buscador Interactivo --- */
        .search-wrapper {
            max-width: 1000px;
            margin: 30px auto 15px auto;
            text-align: center;
        }
        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus {
            border-color: #3b82f6;
        }

        /* --- Leaderboard --- */
        .leaderboard-wrapper {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 1000px;
            margin: 0 auto 40px auto;
        }
        .scroll-container {
            max-height: 550px;
            overflow-y: auto;
        }

        /* --- Gráficos de Votos Extras (Grid de abajo) --- */
        .grid-graficos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 40px auto 0 auto;
            border-top: 2px dashed #e5e7eb;
            padding-top: 40px;
        }
        .grafico-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            min-height: 400px;
        }

        @media (max-width: 600px) {
            .podio-fila-1 { align-items: center; }
            .p1, .p2, .p3 { height: auto; order: unset; }
            .grid-graficos { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>📊 Dashboard Oficial: Polla Mundial</h1>
        <p>Resultados, Posiciones Intermedias y Tendencias de Votos</p>
    </header>

    <div class="podio-capa">
        <div class="podio-fila-1">
            <div class="podio-card p2">
                <div class="podio-puesto">2° Lugar 🥈</div>
                <div class="podio-nombre">Padelera</div>
                <div class="podio-puntos">63 pts</div>
            </div>
            <div class="podio-card p1">
                <div class="podio-puesto">👑 Líder Absoluto 🥇</div>
                <div class="podio-nombre">He-van</div>
                <div class="podio-puntos">65 pts</div>
            </div>
            <div class="podio-card p3">
                <div class="podio-puesto">3° Lugar 🥉</div>
                <div class="podio-nombre">7 Pulmones</div>
                <div class="podio-puntos">63 pts</div>
            </div>
        </div>

        <div class="podio-fila-2">
            <div class="podio-card p4">
                <div class="podio-puesto">4° Lugar</div>
                <div class="podio-nombre">Nacho</div>
                <div class="podio-puntos" style="color:#3b82f6;">62 pts</div>
